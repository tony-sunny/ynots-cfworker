<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tony Sunny</title>
    <style>
      :root {
        --bg: #0f1115;
        --bg-elevated: #161922;
        --text: #e6e8ef;
        --text-muted: #9aa1b1;
        --accent: #6ea8fe;
        --accent-soft: rgba(110, 168, 254, 0.12);
        --border: #262b38;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        background: radial-gradient(circle at 50% 0%, #1a1f2b 0%, var(--bg) 60%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
      }

      main {
        width: 100%;
        max-width: 480px;
        text-align: center;
      }

      .avatar {
        width: 88px;
        height: 88px;
        margin: 0 auto 24px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6ea8fe, #a56eff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: 700;
        color: #0f1115;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      p.tagline {
        margin: 0 0 40px;
        color: var(--text-muted);
        font-size: 15px;
      }

      nav ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      nav a {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 14px 20px;
        border-radius: 12px;
        background: var(--bg-elevated);
        border: 1px solid var(--border);
        color: var(--text);
        text-decoration: none;
        font-size: 16px;
        font-weight: 600;
        transition: border-color 0.2s ease, transform 0.2s ease,
          background 0.2s ease;
      }

      nav a:hover {
        border-color: var(--accent);
        background: var(--accent-soft);
        transform: translateY(-2px);
      }

      nav a .icon {
        font-size: 18px;
        line-height: 1;
        display: inline-flex;
      }

      nav a .icon svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      nav a .icon svg.linkedin-badge {
        border-radius: 4px;
      }

      footer {
        margin-top: 40px;
        font-size: 13px;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="avatar">T</div>
      <h1>Tony Sunny</h1>
      <p class="tagline">Software engineer</p>
      <nav>
        <ul class="nav-list">
          <li>
            <a href="https://github.com/tony-sunny">
              <span class="icon">
                <svg viewBox="0 0 16 16" aria-hidden="true">
                  <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
                    0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01
                    1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95
                    0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27
                    2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82
                    1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01
                    2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z" />
                </svg>
              </span>
              GitHub
            </a>
          </li>
          <li>
            <a href="https://blog.ynots.dev">
              <span class="icon">&#9998;&#65039;</span> Blog
            </a>
          </li>
          <li>
            <a href="https://www.linkedin.com/in/ynotdev">
              <span class="icon">
                <svg class="linkedin-badge" viewBox="0 0 24 24" aria-hidden="true">
                  <rect width="24" height="24" fill="#0A66C2" />
                  <path fill="#fff" d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14
                    1.45-2.14 2.94v5.67H9.36V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.38-1.85
                    3.61 0 4.28 2.38 4.28 5.47v6.27zM5.34 7.43a2.06 2.06 0 1 1 0-4.12
                    2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z" />
                </svg>
              </span>
              LinkedIn
            </a>
          </li>
        </ul>
      </nav>
      <footer>&copy; 2026 Tony Sunny</footer>
    </main>
  </body>
</html>
